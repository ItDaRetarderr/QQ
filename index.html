<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QAYYIM QUEST: RISE OF THE BOIS!</title>
    <style>
        /* =========================================
           CSS VARIABLES & GLOBAL STYLES
           ========================================= */
        :root {
            --gold: #ffd700;
            --bg: #1a1a1a;
            --card-bg: #2a2a2a;
            --text: #ffffff;
            --hp-color: #ff4d4d;
            --mp-color: #4d94ff;
            --exp-color: #ba55d3;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            
            /* FIX FOR MOBILE SCALING */
            height: 100vh;           /* Force body to be exactly the height of the phone screen */
            width: 100vw;            /* Force body to be exactly the width of the phone screen */
            display: flex;           /* Enables flexbox layout */
            flex-direction: column;  /* Stacks top-bar, main-content, and nav vertically */
            overflow: hidden;        /* Prevents accidental scrolling/bouncing on mobile */
            
            /* BACKGROUND OPTIMIZATION */
            background-size: cover;  /* Ensures background image covers the whole screen without stretching */
            background-position: center; 
            background-attachment: fixed;
        }

        /* =========================================
           SCREEN & LAYOUT CONTAINERS
           ========================================= */
        .screen { 
            display: none; 
            /* Ensures the screen takes up exactly the available space */
            width: 100%; 
            height: 100%; 
            
            /* Flexbox to center your game content (Characters, Monsters, etc.) */
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            
            /* Background scaling fix */
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            
            /* Extra protection against scrolling */
            position: relative;
            overflow: hidden;
        }

        /* Ensure that when a screen is active, it uses flex layout */
        .screen.active { 
            display: flex; 
        }
        .active { display: flex; }

        .hero-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .hero-selection-img {
            width: 80px;      /* Adjust size as needed */
            height: 80px;     /* Keep width and height equal for a square/circle */
            object-fit: cover; /* This prevents the image from stretching */
            border-radius: 8px; /* Optional: rounds the corners */
            display: block;
            margin: 0 auto;   /* Centers the image */
            background: #444; /* Optional: placeholder color while image loads */
        }
        .hero-option {
            position: relative; /* Allows the name to sit at the bottom */
            width: 120px;
            height: 120px;
            background: var(--card-bg);
            border: 2px solid var(--gold); /* The sharp yellow border */
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .hero-option:hover {
            transform: scale(1.05);
            border-color: white;
        }

        .hero-name-label {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7); /* Dark semi-transparent bar */
            color: white;
            font-size: 12px;
            padding: 5px 0;
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* UI Modals & Popups */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(30, 30, 30, 0.98); border: 3px solid var(--gold); padding: 20px; z-index: 1000; width: 420px; text-align: center; max-height: 90vh; overflow-y: auto; }
        .menu-item { background: var(--card-bg); padding: 15px; border: 1px solid #444; cursor: pointer; margin-bottom: 5px; text-align: center; }
        .menu-item:hover { border-color: var(--gold); }
        .menu-item:disabled { opacity: 0.5; cursor: not-allowed; border-color: #222; }
        
        .ability-preview-box { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; font-size: 11px; }
        .ab-box { border: 1px solid #555; padding: 10px; background: #222; display: flex; align-items: center; text-align: left; gap: 10px; }
        .pop-hero-img { width: 100px; height: 120px; background: #444; border: 2px solid #fff; margin: 10px auto; }

        /* HUD & Navigation Bars */
        .top-bar { position: absolute; top: 0; width: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: space-around; padding: 10px 0; border-bottom: 2px solid var(--gold); z-index: 100; }
        .bottom-bar { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; gap: 10px; padding: 15px 0; border-top: 2px solid var(--gold); z-index: 100; }

        /* Combat Visuals */
        #combat-view { display: none; width: 90%; justify-content: space-between; align-items: center; }
        .avatar { width: 150px; height: 200px; background: #444; border: 2px solid #fff; }
        .enemy-avatar { border-color: var(--hp-color); }
        
        .hp-bar-container { width: 100%; height: 10px; background: #333; margin-bottom: 5px; border: 1px solid #000; }
        .hp-fill { height: 100%; background: var(--hp-color); transition: width 0.3s; }
        .stat-val { color: var(--gold); font-weight: bold; }
        .nav-btn { 
            /* Increase padding: 15px top/bottom makes it easier to tap on mobile */
            padding: 15px 10px; 
            
            /* Allow buttons to grow and fill the bottom bar evenly */
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;

            cursor: pointer; 
            background: #333; 
            color: white; 
            border: 1px solid var(--gold); 
            font-size: 14px; 
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.2s;
            
            /* Prevent text from touching the edges of the button */
            min-width: 0; 
            margin: 2px;
        }

        /* Add a hover/active state for better feedback when tapped */
        .nav-btn:active {
            background: var(--gold);
            color: black;
        }
        .nav-btn:disabled { opacity: 0.3; border-color: #555; cursor: not-allowed; }

        #combat-log { background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid var(--gold); width: 220px; height: 80px; font-size: 12px; overflow-y: auto; }
        
        .claim-btn { display:none; margin: 10px auto; color:black; font-weight:bold; padding:5px 15px; border: none; cursor: pointer; }

        /* GYM Specific */
        #lift-btn { display: none; width: 150px; height: 150px; border-radius: 50%; background: var(--gold); color: black; font-weight: bold; font-size: 24px; border: 5px solid white; cursor: pointer; margin: 20px auto; }
        #gym-timer { font-size: 20px; color: var(--hp-color); font-weight: bold; }

        /* School Quiz Styles */
        .quiz-option { background: #333; padding: 10px; margin: 5px; border: 1px solid #555; cursor: pointer; }
        .quiz-option:hover { background: #444; border-color: var(--gold); }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        #travel-screen {
            background-color: #000; /* Dark background for the loading screen */
            display: none; /* Controlled by the .active class */
        }

        #travel-screen.active {
            display: flex;
        }
    </style>
</head>
<body>

    <div id="selection-screen" class="screen active">

            CONFIRM SELECTION

        <div id="gym-ui" style="display:none;">

            <div id="gym-timer"></div>
            <button id="lift-btn" onclick="registerLift()">LIFT</button>
        </div>

        <div id="quiz-ui" style="display:none;">
            <p id="quiz-question" style="font-weight:bold; margin-bottom:15px;"></p>
            <div id="quiz-options"></div>
        </div>

        <button id="gold-claim-btn" class="claim-btn" style="background:var(--gold);" onclick="claimGold()">+10 GOLD</button>
        <button id="exp-claim-btn" class="claim-btn" style="background:var(--exp-color); color: white;" onclick="claimExp()">+50 EXP</button>
        <button id="rest-btn" class="claim-btn" style="background:var(--mp-color); color: white;" onclick="restAtHome()">REST (Heal HP/MP)</button>
        
        <button onclick="closeSubMenu()" style="margin-top:10px;">Close</button>
    </div>

    <div id="travel-screen" class="screen">
        <h1 id="travel-text" style="margin-bottom: 10px;">Traveling...</h1>
        
        <div id="loading-container" style="width: 400px; height: 30px; background: #000; border: 3px solid var(--gold); position: relative; overflow: hidden; margin: 20px 0;">
            <div id="loading-fill" style="width: 0%; height: 100%; background: var(--gold); transition: width 0.2s ease-out;"></div>
        </div>

        <div id="press-start" style="display: none; color: var(--gold); font-weight: bold; font-size: 1.2rem; cursor: pointer; animation: blink 1s infinite; margin-top: 20px;">
            — PRESS ANY KEY OR CLICK TO START —
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="top-bar">

            <div>HP: <span id="ui-hp" class="stat-val">?</span>/<span id="ui-maxhp">?</span></div>
            <div>MP: <span id="ui-mp" class="stat-val">?</span>/<span id="ui-maxmp">?</span></div>
            <div>LVL: <span id="ui-lvl" class="stat-val">1</span></div>
            <div>EXP: <span id="ui-exp" class="stat-val">0</span>/<span id="ui-next-exp">50</span></div>
            <div>GOLD: <span id="ui-gold" class="stat-val">0</span></div>
        </div>

        <div id="exploration-view" style="text-align:center;">

        </div>

        <div id="combat-view">

            <button class="nav-btn" id="items-btn" onclick="openItems()">Items</button>
            <button class="nav-btn" id="flee-btn" onclick="flee()">Flee</button>
        </div>
    </div>

        function triggerExplorationEvent() {
            const roll = Math.random(); // Generates a number between 0 and 1
            if (roll < 0.50) {
                // 50% chance for Battle (0.00 to 0.49)
                startFight();
            } else if (roll < 0.60) {
                // 10% chance for Item (0.50 to 0.59)
                itemFind();
            } else if (roll < 0.75) {
                // 15% chance for Message (0.60 to 0.74)
                messageEncounter();
            } else if (roll < 0.90) {
                // 15% chance for Special Message (0.75 to 0.89)
                specialMessage();
            } else {
                // 10% chance for Nothing (0.90 to 1.00)
                nothingEvent();
            } 
        }

        function itemFind() {
            const roll = Math.random();
            let itemName = "";
            let goldAmount = 0;

            if (roll < 0.60) {
                // --- TRASH ITEMS (60%) ---
                const trash = ["Old boot", "Bottle", "Dusty hat"];
                itemName = trash[Math.floor(Math.random() * trash.length)];
                
            } else if (roll < 0.70) {
                // --- CONSUMABLES (10%) ---
                const consumables = ["HP Potion", "MP Potion", "Strength Potion"];
                itemName = consumables[Math.floor(Math.random() * consumables.length)];
                
            } else if (roll < 0.75) {
                // --- SPECIAL ITEMS (5%) ---
                const special = ["Scholarship discount", "Gym discount", "Emmel"];
                itemName = special[Math.floor(Math.random() * special.length)];
                
            } else {
                // --- GOLD (25%) ---
                const goldRoll = Math.random();
                if (goldRoll < 0.90) {
                    // 90% chance for small gold
                    const amounts = [5, 10, 15];
                    goldAmount = amounts[Math.floor(Math.random() * amounts.length)];
                } else {
                    // 10% chance for big gold
                    goldAmount = 50;
                }
            }

            // --- GRANTING THE REWARD ---
            if (goldAmount > 0) {
                player.gold += goldAmount;
                alert(`You found ${goldAmount} Gold lying on the ground!`);
            } else if (itemName !== "") {
                // Add to the same inventory object used by your Shop/Inventory
                inventory[itemName] = (inventory[itemName] || 0) + 1;
                alert(`You found an item: ${itemName}!`);
            }

            updateUI(); 
        }

        function playRPS() {
            let playerWins = 0;
            let npcWins = 0;
            const choices = ["Rock", "Paper", "Scissors"];

            while (playerWins < 2 && npcWins < 2) {
                let input = prompt(`Score: You ${playerWins} - NPC ${npcWins}\nType: R for Rock, P for Paper, S for Scissors`).toUpperCase();
                
                let pChoice = "";
                if (input === "R") pChoice = "Rock";
                else if (input === "P") pChoice = "Paper";
                else if (input === "S") pChoice = "Scissors";
                else { alert("Invalid choice! Try again."); continue; }

                let nChoice = choices[Math.floor(Math.random() * 3)];
                let result = "";

                if (pChoice === nChoice) result = "Tie!";
                else if (
                    (pChoice === "Rock" && nChoice === "Scissors") ||
                    (pChoice === "Paper" && nChoice === "Rock") ||
                    (pChoice === "Scissors" && nChoice === "Paper")
                ) {
                    result = "You win this round!";
                    playerWins++;
                } else {
                    result = "NPC wins this round!";
                    npcWins++;
                }
                alert(`You chose ${pChoice}, NPC chose ${nChoice}.\n${result}`);
            }

            if (playerWins === 2) {
                let prize = Math.floor(Math.random() * 26) + 10; // 10-35
                player.gold += prize;
                alert(`Congratulations! You won the game and ${prize} gold!`);
            } else {
                let loss = Math.floor(Math.random() * 6) + 10; // 10-15
                player.gold = Math.max(0, player.gold - loss);
                alert(`You lost the game... and ${loss} gold.`);
            }
            updateUI();
        }

       function updateUI() {
            // --- 1. DYNAMIC STAT CALCULATIONS ---
            
            // Instead of setting these to 100, we pull the values from the selected hero.
            // If no hero is selected yet, it defaults to 100.
            let baseMaxHp = player.selectedHero ? player.selectedHero.hp : 100;
            let baseMaxMp = player.selectedHero ? player.selectedHero.mp : 100;
            
            let mpBonus = 0;
            let hpBonus = 0;
            let dmgBonus = 0;

            // Apply bonuses from inventory items
            if (inventory["Rubik's Cube"] > 0) {
                mpBonus = 15;
            }
            if (inventory["Zumba Video"] > 0) {
                hpBonus = 20;
            }
            // --- BASTON LOGIC ---
            if (inventory["Baston"] > 0) {
                dmgBonus = 15;
            }

            // Update player max stats with base + bonuses
            player.maxHp = baseMaxHp + hpBonus;
            player.maxMp = baseMaxMp + mpBonus;

            player.bonusDmg = dmgBonus;

            // Safety checks: current HP/MP shouldn't exceed new Max
            if (player.hp > player.maxHp) player.hp = player.maxHp;
            if (player.mp > player.maxMp) player.mp = player.maxMp;

            // --- 2. UPDATE TEXT ELEMENTS ---
            document.getElementById('ui-hp').innerText = Math.round(player.hp);
            document.getElementById('ui-maxhp').innerText = player.maxHp;
            document.getElementById('ui-mp').innerText = Math.round(player.mp);
            document.getElementById('ui-maxmp').innerText = player.maxMp;
            document.getElementById('ui-gold').innerText = player.gold;
            document.getElementById('ui-lvl').innerText = player.lvl;
            
            // --- 3. UPDATE VISUAL BARS ---
            if (document.getElementById('hp-fill')) {
                document.getElementById('hp-fill').style.width = (player.hp / player.maxHp * 100) + "%";
            }
            if (document.getElementById('mp-fill')) {
                document.getElementById('mp-fill').style.width = (player.mp / player.maxMp * 100) + "%";
            }

            // --- 4. EXPERIENCE & LEVELS ---
            const expLabel = document.getElementById('ui-exp');
            const nextExpLabel = document.getElementById('ui-next-exp');
            
            if (player.lvl >= 5) {
                expLabel.innerText = "MAXED";
                nextExpLabel.innerText = "";
            } else {
                expLabel.innerText = player.exp;
                nextExpLabel.innerText = expRequirements[player.lvl];
            }

            // --- 5. COMBAT BUTTONS ---
            document.getElementById('atk-2').disabled = (player.lvl < 3);
            document.getElementById('atk-3').disabled = (player.lvl < 5);

            if(player.selectedHero) {
                document.getElementById('atk-1').innerText = player.selectedHero.abilities[0].name;
                document.getElementById('atk-2').innerText = player.selectedHero.abilities[1].name;
                document.getElementById('atk-3').innerText = player.selectedHero.abilities[2].name;
            }
        }

        function addExp(amount) {
            if (player.lvl >= 5) return;
            player.exp += amount;
            let req = expRequirements[player.lvl];
            while (player.exp >= req && player.lvl < 5) {
                player.exp -= req;
                player.lvl++;
                applyLevelUpStats();
                req = expRequirements[player.lvl];
                alert(`Level Up! You are now Level ${player.lvl}`);
            }
            updateUI();
        }

        function applyLevelUpStats() {
            const scale = player.selectedHero.scaling[player.lvl];
            if(scale) {
                if(scale.hp) player.maxHp += scale.hp;
                if(scale.mp) player.maxMp += scale.mp;
                if(scale.dmgBonus) player.bonusDmg += scale.dmgBonus;
            }
            player.hp = player.maxHp;
            player.mp = player.maxMp;
        }

        function showGymLevels(type) {
            const content = document.getElementById('menu-content');
            content.innerHTML = "";
            const data = gymData[type];
            const playerLvl = type === "lifting" ? player.gymLvlLift : player.gymLvlSpar;

            data.forEach((lvlObj, idx) => {
                const btn = document.createElement('div');
                btn.className = "menu-item";
                
                // --- ADD DISCOUNT LOGIC HERE ---
                const hasDiscount = inventory["Gym discount"] > 0;
                const actualCost = hasDiscount ? Math.floor(lvlObj.cost * 0.4) : lvlObj.cost; // 60% off means pay 40%

                let statusTxt = lvlObj.done ? " [COMPLETED]" : "";
                btn.innerText = `Level ${lvlObj.lvl} (${actualCost}g)${statusTxt}`;
                
                if (lvlObj.lvl > playerLvl) btn.style.opacity = "0.3";
                
                btn.onclick = () => {
                    if (lvlObj.lvl > playerLvl) { alert("Complete previous levels first!"); return; }
                    if (player.gold < actualCost) { alert("Not enough gold!"); return; }
                    
                    const promptMsg = hasDiscount 
                        ? `Gym discount applied! Start Level ${lvlObj.lvl} ${type} for ${actualCost}g?`
                        : `Start Level ${lvlObj.lvl} ${type}? Cost: ${actualCost}g`;

                    if (confirm(promptMsg)) {
                        // Deduct the calculated cost and consume the item
                        player.gold -= actualCost;
                        if (hasDiscount) {
                            inventory["Gym discount"] -= 1;
                            alert("Gym discount used!");
                        }
                        updateUI();

                        if (type === "lifting") startLifting(lvlObj, idx);
                        else startSparring(lvlObj, idx);
                    }
                };
                content.appendChild(btn);
            });
        }

        function startLifting(lvlObj, idx) {
            document.getElementById('menu-content').innerHTML = "";
            document.getElementById('gym-ui').style.display = "block";
            liftClicks = 0;
            liftTarget = lvlObj.clicks;
            liftTimeLeft = lvlObj.time;
            liftTimerStarted = false;
            updateGymUI();
            document.getElementById('gym-timer').innerText = `Time: ${liftTimeLeft}s (Click Lift to Start)`;
            document.getElementById('lift-btn').style.display = "block";
            document.getElementById('lift-btn').onclick = () => registerLift(lvlObj, idx);
        }

        function registerLift(lvlObj, idx) {
            if (!liftTimerStarted) {
                liftTimerStarted = true;
                liftInterval = setInterval(() => {
                    liftTimeLeft--;
                    updateGymUI();
                    if (liftTimeLeft <= 0) {
                        clearInterval(liftInterval);
                        document.getElementById('lift-btn').style.display = "none";
                        alert("Time's up! You failed.");
                        openGym();
                    }
                }, 1000);
            }
            liftClicks++;
            updateGymUI();
            if (liftClicks >= liftTarget) {
                clearInterval(liftInterval);
                document.getElementById('lift-btn').style.display = "none";
                if(!lvlObj.done) {
                    player.maxHp += lvlObj.reward;
                    player.hp = player.maxHp;
                    lvlObj.done = true;
                    if(player.gymLvlLift < 3) player.gymLvlLift++;
                    alert(`Success! HP increased by +${lvlObj.reward}`);
                } else {
                    alert("Completed! No rewards granted as you already finished this.");
                }
                updateUI();
                openGym();
            }
        }

        function updateGymUI() {
            document.getElementById('gym-stats').innerText = `Clicks: ${liftClicks} / ${liftTarget}`;
            document.getElementById('gym-timer').innerText = `Time: ${liftTimeLeft}s`;
        }

        function startSparring(lvlObj, idx) {
            closeSubMenu();
            isCombatActive = true;
            isSparring = true;
            currentSparReward = lvlObj.reward;
            currentSparIndex = idx;
            
            setupEnemy(lvlObj.enemy.name, lvlObj.enemy.hp, lvlObj.enemy.dmg, 0, 0);
            document.getElementById('items-btn').disabled = true;
            document.getElementById('flee-btn').innerText = "Give Up";

            document.getElementById('combat-view').style.display = 'flex';
            document.getElementById('standard-nav').style.display = 'none';
            document.getElementById('combat-nav').style.display = 'flex';
        }

        function handleFieldEntry(field) {
            const data = schoolData[field];
            if(!data.enrolled) {
                // Calculate the cost
                let cost = 100;
                const hasDiscount = inventory["Scholarship discount"] > 0;
                
                if (hasDiscount) {
                    cost = 20; // 80% off 100g
                }

                if(player.gold >= cost) {
                    const promptMsg = hasDiscount 
                        ? `Scholarship discount applied! Enroll in ${field} for only ${cost}g?` 
                        : `Enroll in ${field} for ${cost}g?`;

                    if(confirm(promptMsg)) {
                        player.gold -= cost;
                        data.enrolled = true;
                        
                        // Consume the item
                        if (hasDiscount) {
                            inventory["Scholarship discount"] -= 1;
                            alert("Scholarship discount used!");
                        }
                        
                        updateUI();
                        showQuizLevels(field);
                    }
                } else {
                    alert(`Not enough gold! You need ${cost}g to enroll.`);
                }
            } else {
                showQuizLevels(field);
            }
        }

        function loadQuestion() {
            const field = schoolData[currentField];
            const lvl = field.levels[currentQuizLvl];
            const qData = lvl.questions[currentQuestionIdx];

            document.getElementById('quiz-question').innerText = `[${lvl.name}] Q${currentQuestionIdx + 1}: ${qData.q}`;
            const optContainer = document.getElementById('quiz-options');
            optContainer.innerHTML = "";

            qData.options.forEach(opt => {

                div.onclick = () => checkQuizAnswer(opt, qData.a);

        function checkQuizAnswer(selected, correct) {
            if(selected === correct) {
                currentQuestionIdx++;
                if(currentQuestionIdx >= 3) {
                    alert(`Passed ${schoolData[currentField].levels[currentQuizLvl].name}!`);
                    checkFieldCompletion();
                } else {
                    loadQuestion();
                }
            } else {
                alert("Wrong Answer! You failed and must restart this level.");
                currentQuestionIdx = 0;
                loadQuestion();
            }
        }

        function checkFieldCompletion() {
            const field = schoolData[currentField];
            if (currentQuizLvl === 2) {
                if(!field.finished) {
                    field.finished = true;
                    player.maxMp += 15;
                    player.mp = player.maxMp;
                    alert("Congratulations! You graduated from this field. Max MP +15.");
                } else {
                    alert("Level complete!");
                }
                updateUI();
                showQuizLevels(currentField);
            } else {
                showQuizLevels(currentField);
            }
        }

        function setupCombatButtons() {
            const confirmUI = document.getElementById('battle-confirm-ui');
            const previewText = document.getElementById('battle-preview-text');
            const confirmBtn = document.getElementById('battle-confirm-btn');

            [1, 2, 3].forEach(num => {
                const btn = document.getElementById(`atk-${num}`);
                
                btn.onclick = () => {
                    if (!isPlayerTurn) return;

                    const ab = player.selectedHero.abilities[num - 1];

                    // 1. Check for MP requirements
                    if (player.mp < ab.cost) {
                        document.getElementById('combat-log').innerText = "Not enough MP!";
                        return;
                    }

                    // 2. Visual Highlight: Show which button is selected
                    document.querySelectorAll('.atk-btn').forEach(b => b.style.borderColor = "rgba(255,255,255,0.3)");
                    btn.style.borderColor = "var(--gold)";

                    // 3. Show Ability Info in the Log

                    confirmBtn.onclick = () => {
                        confirmUI.style.display = "none";
                        executeAbility(ab); // Call your logic to deal damage
                    };
                };

        }

        function executeAbility(ab) {
            let actualCost = ab.cost;
            if(player.freeMPTurns > 0) actualCost = 0;
            if(player.selectedHero.name === "Rah Jay" || player.selectedHero.name === "Lil Nas") {
                if(player.mpReduce) actualCost -= 5;
            }
            if (player.mp < actualCost) { alert("Not enough MP!"); return; }
            player.mp -= Math.max(0, actualCost);

            let logMsg = `Used ${ab.name}! `;
            
            // Standard DMG calculation
            const getDmg = (range) => {
                const baseDmg = Math.floor(Math.random() * (range[1] - range[0] + 1)) + range[0];
                
                // player.bonusDmg comes from items like the Baston
                // player.strBuff comes from temporary skills or leveling
                return baseDmg + (player.bonusDmg || 0) + (player.strBuff || 0);
            };

            switch(ab.type) {
                case "dmg":
                    let d = getDmg(ab.val);
                    enemy.hp -= d;
                    logMsg += `Dealt ${d} dmg.`;
                    break;
                case "debuff_dmg":
                    let d1 = getDmg(ab.val);
                    enemy.hp -= d1;
                    player.enemyDmgDebuff = ab.debuff;
                    player.enemyDebuffTurns = ab.duration; 
                    logMsg += `Dealt ${d1} dmg and lowered enemy dmg by ${ab.debuff} for ${ab.duration} turns.`;
                    break;
                case "stun_buff":
                    stunTurns = ab.stun;
                    player.mpReduce = ab.mpReduce;
                    logMsg += `Enemy stunned for ${ab.stun} turns! MP costs reduced.`;
                    break;
                case "chance_dmg":
                    let r = Math.random();
                    let d2 = r < ab.chance1 ? getDmg(ab.val1) : getDmg(ab.val2);
                    enemy.hp -= d2;
                    logMsg += `Lucky! Dealt ${d2} dmg.`;
                    break;
                case "dmg_stun_chance":
                    let d3 = getDmg(ab.val);
                    enemy.hp -= d3;
                    if(Math.random() < ab.stunChance) stunTurns = 1;
                    logMsg += `Dealt ${d3} dmg.`;
                    break;
                case "gamble_death":
                    let hpPerc = enemy.hp / enemy.maxHp;
                    let killChance = 0.1;
                    if(hpPerc <= 0.2) killChance = 1.0;
                    else if(hpPerc <= 0.5) killChance = 0.5;
                    else if(hpPerc <= 0.7) killChance = 0.3;
                    
                    if(Math.random() < killChance) {
                        enemy.hp = 0;
                        logMsg += "DEATH ROLL! Enemy died instantly!";
                    } else {
                        player.hp = 0;
                        logMsg += "DEATH ROLL! You killed yourself!";
                    }
                    break;
                case "dmg_steal":
                    let d4 = getDmg(ab.val);
                    enemy.hp -= d4;
                    logMsg += `Dealt ${d4} dmg.`;
                    if (Math.random() < ab.stealChance) {
                        player.gold += ab.gold;
                        logMsg += ` Lucky! You stole ${ab.gold}g!`;
                    } else {
                        logMsg += ` Failed to steal any gold.`;
                    }
                    break;
                case "dmg_bounty":
                    let d5 = getDmg(ab.val);
                    enemy.hp -= d5;
                    if(enemy.hp <= 0) { player.gold += ab.bonusGold; logMsg += `Killed! Earned +${ab.bonusGold}g bounty!`; }
                    else logMsg += `Dealt ${d5} dmg.`;
                    break;
                case "dmg_dodge_chance":
                    let d6 = getDmg(ab.val);
                    enemy.hp -= d6;
                    if(Math.random() < ab.dodgeChance) player.dodgeNext = true;
                    logMsg += `Dealt ${d6} dmg. Prep for dodge!`;
                    break;
                case "free_mp_heal":
                    player.hp = Math.min(player.maxHp, player.hp + ab.heal);
                    player.freeMPTurns = ab.duration;
                    logMsg += `Healed ${ab.heal} HP. Abilities cost 0 MP for 2 turns!`;
                    break;
                case "dmg_extra_chance":
                    let dBase = getDmg(ab.val);
                    let extra = 0;
                    if (Math.random() < ab.chance) {
                        extra = ab.bonusVal;
                        logMsg += `CRITICAL HIT! `; 
                    }    
                    let totalDmg = dBase + extra;
                    enemy.hp -= totalDmg;
                    logMsg += `Dealt ${totalDmg} dmg.`;
                    break;
                case "buff_dmg_mp":
                    player.strBuff += ab.val;
                    player.mpReduce = ab.mpReduce;
                    player.strTurns = ab.duration;
                    logMsg += `Buffed strength and lowered MP costs!`;
                    break;
                case "dmg_debuff":
                    let d7 = getDmg(ab.val);
                    enemy.hp -= d7;
                    player.enemyDmgDebuff += ab.debuff;
                    player.enemyDebuffTurns = 1;
                    logMsg += `Dealt ${d7} dmg and lowered enemy power.`;
                    break;
                case "crit_stun_chance":
                    let d8 = getDmg(ab.val) * 1; // Manual crit
                    enemy.hp -= d8;
                    if(Math.random() < ab.stunChance) stunTurns = 1;
                    logMsg += `CRITICAL! Dealt ${d8} dmg.`;
                    break;
                case "heal_dmg":
                    let h = Math.floor(Math.random() * (ab.heal[1] - ab.heal[0] + 1)) + ab.heal[0];
                    let d9 = getDmg(ab.val);
                    player.hp = Math.min(player.maxHp, player.hp + h);
                    enemy.hp -= d9;
                    logMsg += `Back Tracked! Healed ${h} and dealt ${d9} dmg.`;
                    break;
                case "percent_dmg_stun":
                    let d10 = Math.floor(enemy.hp * ab.val);
                    enemy.hp -= d10;
                    stunTurns = ab.stun;
                    logMsg += `Sent to future! Dealt ${d10} dmg and stunned enemy.`;
                    break;
                case "self_dmg_attack":
                    let d11 = getDmg(ab.val);
                    enemy.hp -= d11;
                    player.hp -= ab.selfDmg;
                    logMsg += `Bloody Fists! Dealt ${d11} dmg but lost ${ab.selfDmg} HP.`;
                    break;
                case "lifesteal":
                    let d12 = getDmg(ab.val);
                    enemy.hp -= d12;
                    player.hp = Math.min(player.maxHp, player.hp + ab.heal);
                    logMsg += `Life Steal! Dealt ${d12} and healed ${ab.heal}.`;
                    break;
                case "dmg_stun":
                    let d13 = getDmg(ab.val);
                    enemy.hp -= d13;
                    stunTurns = ab.stun;
                    logMsg += `Stunning Strike! Dealt ${d13} dmg.`;
                    break;
                case "dmg_debuff_buff":
                    let d14 = getDmg(ab.val);
                    enemy.hp -= d14;
                    // Apply debuff to enemy
                    player.enemyDmgDebuff += ab.debuff;
                    player.enemyDebuffTurns = ab.duration; 
                    // Apply buff to player
                    player.strBuff += ab.buff;
                    player.strTurns = ab.duration; // Now uses the 2 turns defined in data
                    logMsg += `Tormented! Dealt ${d14} and swapped power for ${ab.duration} turns!`;
                    break;
                case "block_debuff":
                    player.dodgeNext = true;
                    player.enemyDmgDebuff += ab.debuff;
                    player.enemyDebuffTurns = ab.duration;
                    logMsg += "Magic Barrier up! Next attack blocked.";
                    break;
            }

            enemy.hp = Math.max(0, enemy.hp);
            document.getElementById('combat-log').innerText = logMsg;
            updateEnemyBar();

            if(player.strTurns > 0) { player.strTurns--; if(player.strTurns === 0) player.strBuff = 0; }
            if(player.freeMPTurns > 0) player.freeMPTurns--;

            updateUI();
            if(enemy.hp <= 0) win();
            else { isPlayerTurn = false; setTimeout(enemyTurn, 1000); }
        }

        function enemyTurn() {
            // 1. Check for Stun
            if(stunTurns > 0) {
                stunTurns--;
                document.getElementById('combat-log').innerText = `Enemy is stunned! (${stunTurns} left)`;
                setTimeout(() => { isPlayerTurn = true; }, 1000);
                return;
            }

            // 2. Check for Dodge
            if(player.dodgeNext) {
                player.dodgeNext = false;
                document.getElementById('combat-log').innerText = "You dodged the attack!";
                setTimeout(() => { isPlayerTurn = true; }, 1000);
                return;
            }

            // 3. Enemy Performs Attack
            let baseDmg = Math.floor(Math.random() * (enemy.dmg[1] - enemy.dmg[0] + 1)) + enemy.dmg[0];
            let actualDmg = Math.max(0, baseDmg - player.enemyDmgDebuff);
            player.hp = Math.max(0, player.hp - actualDmg);
            
            let logMsg = `${enemy.name} attacks for ${actualDmg} dmg!`;

            // 4. DEBUFF COUNTDOWN (Insert here)
            if(player.enemyDebuffTurns > 0) {
                player.enemyDebuffTurns--;
                if(player.enemyDebuffTurns === 0) {
                    player.enemyDmgDebuff = 0; // Reset debuff amount
                    logMsg += " The enemy's power has returned!";
                }
            }

            document.getElementById('combat-log').innerText = logMsg;

            // 5. Wrap up Turn
            updateUI();
            if(player.hp <= 0) lose();
            else isPlayerTurn = true;
        }

        function win() { 
            if (isSparring) {
                const lvlObj = gymData.sparring[currentSparIndex];
                if(!lvlObj.done) {
                    player.bonusDmg += currentSparReward;
                    lvlObj.done = true;
                    if(player.gymLvlSpar < 3) player.gymLvlSpar++;
                    alert(`Sparring Victory! Damage permanently increased by +${currentSparReward}`);
                } else alert("Sparring Victory!");
            } else {
                let gGain = enemy.gold; 
                let eGain = enemy.exp;

                // --- EMMEL BONUS LOGIC ---
                if (player.equippedAccessory === "Emmel") {
                    eGain += 10; // Add the +10 bonus to the local variable
                }
                // -------------------------

                if(quests.q1.status === "active") inventory["Rags"] = (inventory["Rags"] || 0) + 1;
                if(quests.q3.status === "active") inventory["Peasant Gold"] = (inventory["Peasant Gold"] || 0) + gGain;
                else player.gold += gGain;

                // The alert now shows the boosted eGain
                alert(`Victory! +${gGain}g and +${eGain}exp ${player.equippedAccessory === "Emmel" ? "(+10 from Emmel)" : ""}`); 
                addExp(eGain); 
            }
            endFight(); 
        }

        function lose() { 
            alert(`Defeated! You were sent Home and lost 10g.`); 
            player.gold = Math.max(0, player.gold - 10); 
            player.hp = player.maxHp; player.mp = player.maxMp; 
            endFight(); 
        }

        if (isNaN(amount) || amount <= 0 || amount > maxAmount) {

            player.gold += totalReward;
            alert(`You earned ${totalReward} Gold!`);
            updateUI();
            openShop(); // Refresh the shop to update the counts displayed
        }
    }

            if (isNaN(amount) || amount <= 0) {
                alert("Syntax Error: Amount must be a valid number.");
                return;
            }

            // Add the XP using your existing function to handle level-ups
            addExp(amount); 
            
            alert(`Successfully added ${amount} XP.`);
            
            // Refresh the UI bars and stats
            updateUI();
        }

        // --- NEW !getGold COMMAND ---
        else if (command === "!getgold") {
            // Check if the user provided an amount
            if (args.length < 2) {
                alert("Syntax Error: Use !getGold [amount]");
                return;
            }

            const amount = parseInt(args[1]);

            // Validate that the input is a positive number
            if (isNaN(amount) || amount <= 0) {
                alert("Syntax Error: Please enter a valid number of gold.");
                return;
            }

            // Update the player's gold variable
            player.gold += amount; 
            
            // Refresh the UI so the new gold total appears on screen
            updateUI(); 
            
            alert(`Added ${amount} gold. Total gold: ${player.gold}`);
        }
            else {
                alert("Syntax Error: Unknown command.");
            }
        }

        function claimGold() { player.gold += 10; updateUI(); }
        function claimExp() { addExp(50); }
        function restAtHome() { player.hp = player.maxHp; player.mp = player.maxMp; updateUI(); alert("HP and MP Restored!"); }
        function closeSubMenu() { document.getElementById('sub-menu').style.display = 'none'; clearInterval(liftInterval); }
        function closePopup() { document.getElementById('popup').style.display = 'none'; }
        function flee() {
            // 1. Roll for success (50% chance)
            if (Math.random() < 0.5) {
                alert("You escaped safely!");
                endFight();
            } else {
                // 2. Flee failed: Enemy attacks
                alert("Flee failed! The enemy blocks your path and attacks!");
                
                // Calculate enemy damage (assuming your dmg is an array [min, max])
                let damage = Math.floor(Math.random() * (enemy.dmg[1] - enemy.dmg[0] + 1)) + enemy.dmg[0];
                
                // Apply damage to player
                player.hp -= damage;
                
                // Log the failure
                const log = document.getElementById('combat-log');
                if (log) {
                    log.innerHTML += `<div style="color:red">Failed to flee! ${enemy.name} dealt ${damage} damage!</div>`;
                }
                
                // Update the UI and check if player died from the flee attempt
                updateUI();
                if (player.hp <= 0) {
                    alert("You were struck down while trying to run...");
                    location.reload(); // Or your game over logic
                }
            }
        }
        function updateEnemyBar() { document.getElementById('enemy-hp-fill').style.width = (enemy.hp / enemy.maxHp * 100) + "%"; }
        function transitionToCutscene() {
            // 1. Switch from Hero Selection to the Travel/Loading Screen
            document.getElementById('selection-screen').classList.remove('active');
            const travelScreen = document.getElementById('travel-screen');
            travelScreen.classList.add('active');

            // 2. Setup the loading elements
            const loadingFill = document.getElementById('loading-fill');
            const pressStart = document.getElementById('press-start');
            const travelText = document.getElementById('travel-text');

            loadingFill.style.width = "0%";
            pressStart.style.display = "none";
            travelText.innerText = "INITIALIZING BOI DATA...";

            // 3. Start the Loading Bar Animation
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15; // Random loading speed
                if (progress > 100) progress = 100;
                
                loadingFill.style.width = progress + "%";

                if (progress >= 100) {
                    clearInterval(interval);
                    travelText.innerText = "READY TO RISE";
                    pressStart.style.display = "block"; // Show the blinking text
                    
                    // 4. Wait for the player to press a key or click to actually start
                    const handleInitialStart = () => {
                        window.removeEventListener('keydown', handleInitialStart);
                        window.removeEventListener('click', handleInitialStart);
                        startGame(); // Finally move to the game screen
                    };

                    window.addEventListener('keydown', handleInitialStart);
                    window.addEventListener('click', handleInitialStart);
                }
            }, 200);
        }

        function startGame() {
            // 1. Transition to the main Game Screen
            document.getElementById('travel-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            
            // 2. Initialize the UI with player data
            document.getElementById('ui-name').innerText = player.name;
            document.getElementById('location-text').innerText = "Alley Way Central";
            
            updateUI();
        }
    </script>
</body>
